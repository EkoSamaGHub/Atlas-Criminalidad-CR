name: Update Crime Data

on:
  schedule:
    # Runs every Monday at 6 AM UTC (roughly when MJP publishes new data)
    - cron: "0 6 * * 1"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scrape Excel files from Observatorio
        run: npm run scrape

      - name: Process and normalise data
        run: npm run process

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: update crime data $(date -u +%Y-%m-%d) [skip ci]"
          git push
