name: Update Crime Data

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 6 AM UTC
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install pdfplumber requests

      - name: Scrape Excel files
        run: npm run scrape

      - name: Extract PDF tables
        run: npm run extract-pdfs

      - name: Normalise and build crimes.json
        run: npm run process

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: update crime data $(date -u +%Y-%m-%d) [skip ci]"
          git push
